# Flight Path — local database (and future app services)
#
# Starts a self-hosted PostgreSQL database in a container on this Mac.
# This REPLACES Supabase. We only use the database part now; login is
# handled by our own backend code (see db/init/01-schema.sql for the tables).
#
# Quick commands (run from the repo root):
#   docker compose up -d        start the database in the background
#   docker compose ps           see if it's running
#   docker compose logs -f db   follow database logs
#   docker compose down         stop (keeps the saved data)
#   docker compose down -v      stop AND erase all saved data (destructive)
#
# Connection details (for the Next.js app, worker, etc.):
#   postgres://flightpath:<password>@localhost:5433/flightpath
# (the real password lives in the .env file next to this one)

services:
  db:
    image: postgres:16-alpine
    container_name: flightpath-postgres
    restart: unless-stopped
    # Host port 5433 is used because 5432 is already taken on this Mac.
    # From inside the Docker network the database is reached at host "db" port 5432.
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flightpath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-flightpath}
    volumes:
      # Persist the database files so data survives restarts / reboots.
      - flightpath_pgdata:/var/lib/postgresql/data
      # Auto-run our schema + seed data the FIRST time the database is created.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flightpath} -d ${POSTGRES_DB:-flightpath}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flightpath-net

volumes:
  flightpath_pgdata:

networks:
  flightpath-net:
    name: flightpath-net
